name: default
persona: default_persona.md

model:
  provider: ollama      # ollama | anthropic | openai | google
  name: llama3.2        # override with AGENT_MODEL env var
  temperature: 0.7

tools:
  - calculator
  - file_reader
  # - web_search        # uncomment + set TAVILY_API_KEY for web search

memory:
  long_term: true
  dir: .agentkit        # where memory.db is stored
  thread_ttl: 3600      # seconds before a thread is considered stale

server:
  host: "0.0.0.0"
  port: 8000
