name: default
persona: default_persona.md

model:
  provider: ollama      # ollama | anthropic | openai | google
  name: qwen3.5:4b        # override with AGENT_MODEL env var
  temperature: 0.7
  thinking: false         # set true to enable extended thinking (qwen3, claude, etc.)

tools:
  - calculator
  - file_reader
  # - web_search        # uncomment + set TAVILY_API_KEY for web search
  # - bash_exec         # run shell commands
  # - code_editor       # read / write / edit files
  # - python_repl       # execute Python code in a subprocess
  # - github_read_file  # read files from GitHub repos (set GITHUB_TOKEN for private)
  # - github_list_issues
  # - github_get_issue
  # - image_vision      # describe images (requires ANTHROPIC_API_KEY or OPENAI_API_KEY)
  # - sqlite_query      # query a local SQLite database

memory:
  long_term: true
  dir: .agentkit        # where memory.db is stored
  thread_ttl: 3600      # seconds before a thread is considered stale

server:
  host: "0.0.0.0"
  port: 8000
